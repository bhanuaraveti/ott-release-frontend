    <rect x="440" y="150" width="40" height="30" rx="4"/>
    <rect x="440" y="210" width="40" height="30" rx="4"/>
    <rect x="440" y="270" width="40" height="30" rx="4"/>
    <rect x="440" y="330" width="40" height="30" rx="4"/>
    <rect x="440" y="390" width="40" height="30" rx="4"/>
    <rect x="440" y="450" width="40" height="30" rx="4"/>
    <rect x="440" y="510" width="40" height="30" rx="4"/>
    <rect x="440" y="570" width="40" height="30" rx="4"/>
    <rect x="440" y="630" width="40" height="30" rx="4"/>
    <rect x="440" y="690" width="40" height="30" rx="4"/>
