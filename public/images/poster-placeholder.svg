<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="500" height="750" role="img" aria-label="Poster placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="500" height="750" fill="url(#bg)"/>
  <!-- left film-strip perforations -->
  <g fill="#374151">
    <rect x="20" y="30" width="40" height="30" rx="4"/>
    <rect x="20" y="90" width="40" height="30" rx="4"/>
    <rect x="20" y="150" width="40" height="30" rx="4"/>
    <rect x="20" y="210" width="40" height="30" rx="4"/>
    <rect x="20" y="270" width="40" height="30" rx="4"/>
    <rect x="20" y="330" width="40" height="30" rx="4"/>
    <rect x="20" y="390" width="40" height="30" rx="4"/>
    <rect x="20" y="450" width="40" height="30" rx="4"/>
    <rect x="20" y="510" width="40" height="30" rx="4"/>
    <rect x="20" y="570" width="40" height="30" rx="4"/>
    <rect x="20" y="630" width="40" height="30" rx="4"/>
    <rect x="20" y="690" width="40" height="30" rx="4"/>
  </g>
  <!-- right film-strip perforations -->
