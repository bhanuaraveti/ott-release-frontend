  <text x="250" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="600" fill="#9ca3af">Poster coming soon</text>
  <text x="250" y="525" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" fill="#6b7280">Artwork will appear here once indexed.</text>
